<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <clipPath id="clip-wk">
      <rect width="220" height="220" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background: deep navy, very different from devstash brown -->
  <rect width="220" height="220" rx="14" fill="#0d1b2a"/>

  <!-- Header: gold instead of red -->
  <rect x="0" y="0" width="220" height="54" fill="#d4a017" clip-path="url(#clip-wk)"/>
  <text x="110" y="24" font-family="system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#1a1714" text-anchor="middle" letter-spacing="1.5">WORKSHOPIA</text>
  <text x="110" y="42" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#3d2e00" text-anchor="middle" letter-spacing="2">RUST · MULTI-AGENT</text>

  <!-- Subtitle -->
  <text x="110" y="66" font-family="system-ui,sans-serif" font-size="7" fill="#4a6a8a" text-anchor="middle" letter-spacing="1.5">DIDACTIC UNIT GENERATOR</text>

  <!-- LEFT: workflow nodes -->

  <!-- Node 1: AI model input — blue -->
  <rect x="16" y="74" width="88" height="22" rx="5" fill="#4dd0ff" fill-opacity="0.1" stroke="#4dd0ff" stroke-width="0.75" stroke-opacity="0.55"/>
  <text x="60" y="89" font-family="system-ui,sans-serif" font-size="8" fill="#4dd0ff" text-anchor="middle" font-weight="600">Claude / GPT</text>

  <!-- Arrow -->
  <path d="M60,96 L60,108" stroke="#1e3a5a" stroke-width="1.5" stroke-dasharray="2.5,2"/>

  <!-- Node 2: Skills workflow — rust orange -->
  <rect x="16" y="108" width="88" height="22" rx="5" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-width="0.75" stroke-opacity="0.55"/>
  <text x="60" y="123" font-family="system-ui,sans-serif" font-size="8" fill="#f97316" text-anchor="middle" font-weight="600">8-Session Skills</text>

  <!-- Arrow -->
  <path d="M60,130 L60,142" stroke="#1e3a5a" stroke-width="1.5" stroke-dasharray="2.5,2"/>

  <!-- Node 3: Output — green -->
  <rect x="16" y="142" width="88" height="22" rx="5" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="0.75" stroke-opacity="0.55"/>
  <text x="60" y="157" font-family="system-ui,sans-serif" font-size="8" fill="#22c55e" text-anchor="middle" font-weight="600">3 PDF + Email</text>

  <!-- Vertical separator -->
  <line x1="116" y1="68" x2="116" y2="190" stroke="#1e3a5a" stroke-width="0.75"/>

  <!-- RIGHT: PDF cards with navy base -->

  <!-- Card 1: Academic — orange -->
  <rect x="124" y="74" width="80" height="30" rx="5" fill="#112033" stroke="#1e3a5a" stroke-width="0.75"/>
  <rect x="124" y="74" width="6" height="30" rx="3" fill="#f97316" opacity="0.85" clip-path="url(#clip-wk)"/>
  <text x="166" y="87" font-family="system-ui,sans-serif" font-size="7.5" fill="#e2eaf4" text-anchor="middle" font-weight="600" opacity="0.9">Academic</text>
  <text x="166" y="98" font-family="system-ui,sans-serif" font-size="6.5" fill="#e2eaf4" text-anchor="middle" opacity="0.4">Planning</text>

  <!-- Card 2: Guide — blue -->
  <rect x="124" y="112" width="80" height="30" rx="5" fill="#112033" stroke="#1e3a5a" stroke-width="0.75"/>
  <rect x="124" y="112" width="6" height="30" rx="3" fill="#4dd0ff" opacity="0.85" clip-path="url(#clip-wk)"/>
  <text x="166" y="125" font-family="system-ui,sans-serif" font-size="7.5" fill="#e2eaf4" text-anchor="middle" font-weight="600" opacity="0.9">Facilitator</text>
  <text x="166" y="136" font-family="system-ui,sans-serif" font-size="6.5" fill="#e2eaf4" text-anchor="middle" opacity="0.4">Guide</text>

  <!-- Card 3: Brochure — green -->
  <rect x="124" y="150" width="80" height="30" rx="5" fill="#112033" stroke="#1e3a5a" stroke-width="0.75"/>
  <rect x="124" y="150" width="6" height="30" rx="3" fill="#22c55e" opacity="0.85" clip-path="url(#clip-wk)"/>
  <text x="166" y="163" font-family="system-ui,sans-serif" font-size="7.5" fill="#e2eaf4" text-anchor="middle" font-weight="600" opacity="0.9">Commercial</text>
  <text x="166" y="174" font-family="system-ui,sans-serif" font-size="6.5" fill="#e2eaf4" text-anchor="middle" opacity="0.4">Brochure</text>

  <!-- Bottom bar -->
  <rect x="0" y="200" width="220" height="20" fill="#d4a017" opacity="0.07" clip-path="url(#clip-wk)"/>
  <text x="110" y="214" font-family="system-ui,sans-serif" font-size="6.5" fill="#d4a017" text-anchor="middle" letter-spacing="0.5" opacity="0.6">github / javicoderh / rust_llm_server</text>
</svg>
