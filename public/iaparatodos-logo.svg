<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#21468f"/>
    </linearGradient>
    <linearGradient id="cell-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d1ff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.92)"/>
    </linearGradient>
  </defs>

  <!-- Logo container: navy→blue gradient rounded square, matching brand-mark -->
  <rect x="20" y="20" width="180" height="180" rx="38" fill="url(#bg-grad)"/>

  <!-- Left cell: white (brand-mark span:first-child) -->
  <rect x="46" y="46" width="57" height="128" rx="22" fill="#ffffffeb"/>

  <!-- Right cell: cyan→white gradient (brand-mark span:last-child) -->
  <rect x="117" y="46" width="57" height="128" rx="22" fill="url(#cell-grad)"/>
</svg>
